# ============================================================================
#  Solar-Solution — drop-in card preset for the SolarSynk V3 add-on
#  https://github.com/martinville/solarsynkv3
#
#  SolarSynk publishes entities named:
#      sensor.solarsynkv3_<SERIAL>_<name>
#
#  HOW TO USE:
#  1. Find your inverter serial (the SolarSynk add-on config / entity names).
#  2. Replace every "YOURSERIAL" below with that serial. Quick way:
#       sed 's/YOURSERIAL/1234567890/g' card.yaml > my-card.yaml
#  3. Paste into a Manual card on your dashboard (or see dashboard.yaml).
#
#  NOTE: SolarSynk indexes MPPT strings and phases from 0, so the first PV
#  string is pv_mppt0 and the first grid phase is grid_phase0.
# ============================================================================

type: custom:solar-solution
glow_theme: neon # HUD accent: neon | ice | fire | aurora | mono

# Futuristic sky (optional): auto-detects sun.sun + your first weather.* entity.
# Uncomment to pin specific ones (sun → real day/night & moon; weather → sky FX).
# sun_entity: sun.sun
# weather_entity: weather.forecast_home

large_font: false
show_solar: true
show_battery: true
show_grid: true

inverter:
  model: sunsynk
  modern: true
  autarky: power
  three_phase: false

battery:
  energy: 0 # set to your battery capacity in Wh to enable runtime estimate
  shutdown_soc: 20
  show_daily: true
  dynamic_colour: true
  animation_speed: 6
  max_power: 8000

solar:
  show_daily: true
  mppts: 2 # increase to match the number of PV strings you actually use
  animation_speed: 9
  max_power: 8000

load:
  show_daily: true
  animation_speed: 4
  max_power: 8000

grid:
  show_daily_buy: true
  show_daily_sell: true
  animation_speed: 8
  max_power: 8000

entities:
  # ---- Inverter ----
  inverter_voltage_154: sensor.solarsynkv3_YOURSERIAL_inverter_voltager_phase_0
  inverter_current_164: sensor.solarsynkv3_YOURSERIAL_inverter_current_phase_0
  inverter_power_175: sensor.solarsynkv3_YOURSERIAL_inverter_power
  inverter_status_59: sensor.solarsynkv3_YOURSERIAL_status
  # Work-mode indicators. These are inverter integers, so the on/off icon may
  # need tuning (or swap the two if they read reversed for your inverter).
  priority_load_243: sensor.solarsynkv3_YOURSERIAL_energymode
  use_timer_248: sensor.solarsynkv3_YOURSERIAL_sysworkmode
  load_frequency_192: sensor.solarsynkv3_YOURSERIAL_load_frequency
  grid_connected_status_194: sensor.solarsynkv3_YOURSERIAL_gridsignal
  dc_transformer_temp_90: sensor.solarsynkv3_YOURSERIAL_inverter_dc_temperature
  radiator_temp_91: sensor.solarsynkv3_YOURSERIAL_inverter_ac_temperature

  # ---- Battery ----
  battery_soc_184: sensor.solarsynkv3_YOURSERIAL_battery_soc
  battery_power_190: sensor.solarsynkv3_YOURSERIAL_battery_power
  battery_voltage_183: sensor.solarsynkv3_YOURSERIAL_battery_voltage
  battery_current_191: sensor.solarsynkv3_YOURSERIAL_battery_bms_current # some inverters: _battery_current
  battery_temp_182: sensor.solarsynkv3_YOURSERIAL_battery_bms_temperature # some inverters: _battery_temperature
  battery_status: sensor.solarsynkv3_YOURSERIAL_battery_status
  battery_rated_capacity: sensor.solarsynkv3_YOURSERIAL_battery_capacity # Ah
  battery_efficiency: sensor.solarsynkv3_YOURSERIAL_battery_efficiency
  battery_soh: sensor.solarsynkv3_YOURSERIAL_battery_soh # state of health (if published)

  # ---- Optional extras (map if you have them) ----
  # environment_temp: sensor.outside_temperature        # ambient temp (any source)
  # prepaid_units: input_number.prepaid_kwh             # manual kWh credit helper
  day_battery_charge_70: sensor.solarsynkv3_YOURSERIAL_battery_etoday_charge
  day_battery_discharge_71: sensor.solarsynkv3_YOURSERIAL_battery_etoday_discharge

  # ---- Battery 2 (only if battery.count: 2; SolarSynk has no battery_power2) ----
  battery2_soc_184: sensor.solarsynkv3_YOURSERIAL_battery_soc2
  battery2_voltage_183: sensor.solarsynkv3_YOURSERIAL_battery_voltage2
  battery2_current_191: sensor.solarsynkv3_YOURSERIAL_battery_current2
  battery2_temp_182: sensor.solarsynkv3_YOURSERIAL_battery_temperature2
  battery2_status: sensor.solarsynkv3_YOURSERIAL_battery_status2

  # ---- Solar (MPPT strings are 0-indexed in SolarSynk) ----
  pv1_power_186: sensor.solarsynkv3_YOURSERIAL_pv_mppt0_power
  pv1_voltage_109: sensor.solarsynkv3_YOURSERIAL_pv_mppt0_voltage
  pv1_current_110: sensor.solarsynkv3_YOURSERIAL_pv_mppt0_current
  pv2_power_187: sensor.solarsynkv3_YOURSERIAL_pv_mppt1_power
  pv2_voltage_111: sensor.solarsynkv3_YOURSERIAL_pv_mppt1_voltage
  pv2_current_112: sensor.solarsynkv3_YOURSERIAL_pv_mppt1_current
  pv3_power_188: sensor.solarsynkv3_YOURSERIAL_pv_mppt2_power
  pv3_voltage_113: sensor.solarsynkv3_YOURSERIAL_pv_mppt2_voltage
  pv3_current_114: sensor.solarsynkv3_YOURSERIAL_pv_mppt2_current
  pv4_power_189: sensor.solarsynkv3_YOURSERIAL_pv_mppt3_power
  pv4_voltage_115: sensor.solarsynkv3_YOURSERIAL_pv_mppt3_voltage
  pv4_current_116: sensor.solarsynkv3_YOURSERIAL_pv_mppt3_current
  # MPPT 5 & 6 (shown on compact/lite or wide layouts; set solar.mppts: 5 or 6)
  pv5_power: sensor.solarsynkv3_YOURSERIAL_pv_mppt4_power
  pv5_voltage: sensor.solarsynkv3_YOURSERIAL_pv_mppt4_voltage
  pv5_current: sensor.solarsynkv3_YOURSERIAL_pv_mppt4_current
  pv6_power: sensor.solarsynkv3_YOURSERIAL_pv_mppt5_power
  pv6_voltage: sensor.solarsynkv3_YOURSERIAL_pv_mppt5_voltage
  pv6_current: sensor.solarsynkv3_YOURSERIAL_pv_mppt5_current
  day_pv_energy_108: sensor.solarsynkv3_YOURSERIAL_pv_etoday
  total_pv_generation: sensor.solarsynkv3_YOURSERIAL_pv_etotal
  solar_sell_247: sensor.solarsynkv3_YOURSERIAL_solarsell # solar-sell on/off status
  max_sell_power: sensor.solarsynkv3_YOURSERIAL_solarmaxsellpower
  # (pv_total is intentionally omitted — the card sums the mapped pv1..pvN strings)

  # ---- Grid ----
  grid_power_169: sensor.solarsynkv3_YOURSERIAL_grid_pac
  grid_ct_power_172: sensor.solarsynkv3_YOURSERIAL_grid_pac
  grid_voltage: sensor.solarsynkv3_YOURSERIAL_grid_phase0_voltage
  # Daily buy/sell: SolarSynk's _from = imported, _to = exported.
  # If your buy/sell read swapped, swap _from and _to below.
  day_grid_import_76: sensor.solarsynkv3_YOURSERIAL_grid_etoday_from
  day_grid_export_77: sensor.solarsynkv3_YOURSERIAL_grid_etoday_to

  # ---- Load ----
  essential_power: sensor.solarsynkv3_YOURSERIAL_load_total_power
  day_load_energy_84: sensor.solarsynkv3_YOURSERIAL_load_daily_used
