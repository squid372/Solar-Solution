# ============================================================================
#  Example dashboard wiring the full Solar-Solution suite to the SolarSynk V3
#  add-on: the power-flow card plus every companion card (battery, inverter,
#  daily energy, self-sufficiency, solar-vs-grid).
#
#  Replace YOURSERIAL with your inverter serial throughout.
#  Add via: Settings -> Dashboards -> (your dashboard) -> Edit -> Raw
#  configuration editor, then paste this `views:` entry.
# ============================================================================

title: Solar
views:
  - title: Power Flow
    path: power-flow
    type: sections
    max_columns: 2
    sections:
      # ----- Main animated power-flow card ---------------------------------
      - type: grid
        cards:
          - type: custom:solar-solution
            glow_theme: neon # HUD accent: neon | ice | fire | aurora | mono
            show_solar: true
            show_battery: true
            show_grid: true
            inverter:
              model: sunsynk
              modern: true
              autarky: power
            battery:
              energy: 0
              shutdown_soc: 20
              show_daily: true
              dynamic_colour: true
            solar:
              show_daily: true
              mppts: 2
            load:
              show_daily: true
            grid:
              show_daily_buy: true
              show_daily_sell: true
            entities:
              inverter_voltage_154: sensor.solarsynkv3_YOURSERIAL_inverter_voltager_phase_0
              inverter_current_164: sensor.solarsynkv3_YOURSERIAL_inverter_current_phase_0
              inverter_power_175: sensor.solarsynkv3_YOURSERIAL_inverter_power
              inverter_status_59: sensor.solarsynkv3_YOURSERIAL_status
              priority_load_243: sensor.solarsynkv3_YOURSERIAL_energymode
              use_timer_248: sensor.solarsynkv3_YOURSERIAL_sysworkmode
              load_frequency_192: sensor.solarsynkv3_YOURSERIAL_load_frequency
              grid_connected_status_194: sensor.solarsynkv3_YOURSERIAL_gridsignal
              dc_transformer_temp_90: sensor.solarsynkv3_YOURSERIAL_inverter_dc_temperature
              radiator_temp_91: sensor.solarsynkv3_YOURSERIAL_inverter_ac_temperature
              battery_soc_184: sensor.solarsynkv3_YOURSERIAL_battery_soc
              battery_power_190: sensor.solarsynkv3_YOURSERIAL_battery_power
              battery_voltage_183: sensor.solarsynkv3_YOURSERIAL_battery_voltage
              battery_current_191: sensor.solarsynkv3_YOURSERIAL_battery_bms_current
              battery_temp_182: sensor.solarsynkv3_YOURSERIAL_battery_bms_temperature
              battery_status: sensor.solarsynkv3_YOURSERIAL_battery_status
              battery_rated_capacity: sensor.solarsynkv3_YOURSERIAL_battery_capacity
              battery_efficiency: sensor.solarsynkv3_YOURSERIAL_battery_efficiency
              battery_soh: sensor.solarsynkv3_YOURSERIAL_battery_soh
              day_battery_charge_70: sensor.solarsynkv3_YOURSERIAL_battery_etoday_charge
              day_battery_discharge_71: sensor.solarsynkv3_YOURSERIAL_battery_etoday_discharge
              pv1_power_186: sensor.solarsynkv3_YOURSERIAL_pv_mppt0_power
              pv1_voltage_109: sensor.solarsynkv3_YOURSERIAL_pv_mppt0_voltage
              pv1_current_110: sensor.solarsynkv3_YOURSERIAL_pv_mppt0_current
              pv2_power_187: sensor.solarsynkv3_YOURSERIAL_pv_mppt1_power
              pv2_voltage_111: sensor.solarsynkv3_YOURSERIAL_pv_mppt1_voltage
              pv2_current_112: sensor.solarsynkv3_YOURSERIAL_pv_mppt1_current
              day_pv_energy_108: sensor.solarsynkv3_YOURSERIAL_pv_etoday
              total_pv_generation: sensor.solarsynkv3_YOURSERIAL_pv_etotal
              solar_sell_247: sensor.solarsynkv3_YOURSERIAL_solarsell
              max_sell_power: sensor.solarsynkv3_YOURSERIAL_solarmaxsellpower
              grid_power_169: sensor.solarsynkv3_YOURSERIAL_grid_pac
              grid_ct_power_172: sensor.solarsynkv3_YOURSERIAL_grid_pac
              grid_voltage: sensor.solarsynkv3_YOURSERIAL_grid_phase0_voltage
              day_grid_import_76: sensor.solarsynkv3_YOURSERIAL_grid_etoday_from
              day_grid_export_77: sensor.solarsynkv3_YOURSERIAL_grid_etoday_to
              essential_power: sensor.solarsynkv3_YOURSERIAL_load_total_power
              day_load_energy_84: sensor.solarsynkv3_YOURSERIAL_load_daily_used

      # ----- Battery status + self-sufficiency -----------------------------
      - type: grid
        cards:
          - type: custom:solar-solution-battery
            title: Battery
            glow: true
            soc: sensor.solarsynkv3_YOURSERIAL_battery_soc
            power: sensor.solarsynkv3_YOURSERIAL_battery_power
            voltage: sensor.solarsynkv3_YOURSERIAL_battery_voltage
            current: sensor.solarsynkv3_YOURSERIAL_battery_bms_current
            temp: sensor.solarsynkv3_YOURSERIAL_battery_bms_temperature

          - type: custom:solar-solution-self-sufficiency
            title: Self-sufficiency
            glow: true
            load: sensor.solarsynkv3_YOURSERIAL_load_daily_used
            grid_import: sensor.solarsynkv3_YOURSERIAL_grid_etoday_from

      # ----- Daily energy + solar vs grid ----------------------------------
      - type: grid
        cards:
          - type: custom:solar-solution-energy-summary
            title: Daily energy
            glow: true
            solar: sensor.solarsynkv3_YOURSERIAL_pv_etoday
            load: sensor.solarsynkv3_YOURSERIAL_load_daily_used
            battery_charge: sensor.solarsynkv3_YOURSERIAL_battery_etoday_charge
            battery_discharge: sensor.solarsynkv3_YOURSERIAL_battery_etoday_discharge
            grid_import: sensor.solarsynkv3_YOURSERIAL_grid_etoday_from
            grid_export: sensor.solarsynkv3_YOURSERIAL_grid_etoday_to

          - type: custom:solar-solution-grid-balance
            title: Solar vs Grid
            glow: true
            left:
              entity: sensor.solarsynkv3_YOURSERIAL_pv_etoday
              label: Solar
              colour: '#ffa500'
            right:
              entity: sensor.solarsynkv3_YOURSERIAL_grid_etoday_from
              label: Grid
              colour: '#5490c2'

      # ----- All inverter settings -----------------------------------------
      - type: grid
        cards:
          - type: custom:solar-solution-inverter
            title: Inverter
            glow: true
            status: sensor.solarsynkv3_YOURSERIAL_status
            entities:
              - entity: sensor.solarsynkv3_YOURSERIAL_sysworkmode
                label: Work mode
                icon: mdi:cog
              - entity: sensor.solarsynkv3_YOURSERIAL_energymode
                label: Priority
                icon: mdi:flash
              - entity: sensor.solarsynkv3_YOURSERIAL_solarsell
                label: Solar sell
                icon: mdi:cash
              - entity: sensor.solarsynkv3_YOURSERIAL_solarmaxsellpower
                label: Max sell
                icon: mdi:transmission-tower-export
              - entity: sensor.solarsynkv3_YOURSERIAL_inverter_power
                label: Output
                icon: mdi:power-plug
              - entity: sensor.solarsynkv3_YOURSERIAL_load_total_power
                label: Load
                icon: mdi:home-lightning-bolt
              - entity: sensor.solarsynkv3_YOURSERIAL_load_frequency
                label: Frequency
                icon: mdi:sine-wave
              - entity: sensor.solarsynkv3_YOURSERIAL_grid_phase0_voltage
                label: Grid voltage
                icon: mdi:flash-triangle
              - entity: sensor.solarsynkv3_YOURSERIAL_gridsignal
                label: Grid
                icon: mdi:transmission-tower
              - entity: sensor.solarsynkv3_YOURSERIAL_inverter_dc_temperature
                label: DC temp
                icon: mdi:thermometer
              - entity: sensor.solarsynkv3_YOURSERIAL_inverter_ac_temperature
                label: AC temp
                icon: mdi:thermometer
              - entity: sensor.solarsynkv3_YOURSERIAL_battery_capacity
                label: Capacity
                icon: mdi:battery-high
              - entity: sensor.solarsynkv3_YOURSERIAL_pv_etotal
                label: PV lifetime
                icon: mdi:solar-power
              - entity: sensor.solarsynkv3_YOURSERIAL_battery_status
                label: Battery
                icon: mdi:battery-heart-variant
