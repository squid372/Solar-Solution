<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1830"/>
      <stop offset="1" stop-color="#060912"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.4" cy="0.34" r="0.78">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.44" stop-color="#7fd0ff"/>
      <stop offset="1" stop-color="#13386b"/>
    </radialGradient>
    <radialGradient id="orbglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7fd0ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7fd0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="0.5" stop-color="#ffb300"/>
      <stop offset="1" stop-color="#ffb300" stop-opacity="0.2"/>
    </radialGradient>
    <radialGradient id="vign" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.6" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.45"/>
    </radialGradient>
    <style>
      text { text-anchor: middle; }
      .flow { fill: none; stroke-width: 3; stroke-linecap: round; stroke-opacity: 0.35; }
      .stream { fill: none; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 3 7; opacity: 0.85;
        animation: flow 0.9s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -10; } }
      .pulse { fill: none; stroke: #cfeaff; stroke-width: 2; transform-box: fill-box; transform-origin: center;
        opacity: 0; animation: pulse 3s ease-out infinite; }
      @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }
      .ray { stroke: #ffb300; stroke-width: 2.2; stroke-linecap: round; opacity: 0.6;
        transform-box: fill-box; transform-origin: center; animation: spin 30s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .struct { fill: none; stroke-width: 2.2; stroke-linejoin: round; stroke-linecap: round; }
      .lbl { fill: #9fb6d8; font-size: 11px; letter-spacing: 1.5px; }
      .val { fill: #fff; font-size: 15px; font-weight: 700; }
      .panel { fill: rgba(90,140,220,0.06); stroke: rgba(150,190,255,0.16); }
    </style>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- grid floor -->
  <g stroke="#4aa8ff" stroke-opacity="0.13" stroke-width="1">
    <line x1="40" y1="340" x2="-120" y2="420"/><line x1="180" y1="340" x2="120" y2="420"/>
    <line x1="320" y1="340" x2="320" y2="420"/><line x1="460" y1="340" x2="520" y2="420"/>
    <line x1="600" y1="340" x2="680" y2="420"/><line x1="760" y1="340" x2="920" y2="420"/>
    <line x1="0" y1="370" x2="800" y2="370"/><line x1="0" y1="398" x2="800" y2="398"/>
  </g>
  <!-- stars -->
  <g fill="#cfe0ff" opacity="0.5">
    <circle cx="120" cy="60" r="1"/><circle cx="300" cy="40" r="0.8"/><circle cx="520" cy="56" r="1.1"/>
    <circle cx="680" cy="44" r="0.9"/><circle cx="230" cy="90" r="0.7"/><circle cx="600" cy="84" r="1"/>
  </g>

  <!-- headline -->
  <text x="400" y="44" fill="#ffffff" font-size="30" font-weight="800">94% SELF-POWERED</text>
  <text x="400" y="64" fill="#9fc6ff" font-size="12" font-weight="700" letter-spacing="2">+1.24 kW EXPORTING</text>

  <!-- conduits -->
  <path class="flow" style="stroke:#ffb300" d="M152 150 C 240 220, 320 240, 360 250"/>
  <path class="stream" style="stroke:#ffb300" d="M152 150 C 240 220, 320 240, 360 250"/>
  <path class="flow" style="stroke:#33c463" d="M150 300 C 240 296, 320 280, 362 262"/>
  <path class="stream" style="stroke:#33c463" d="M150 300 C 240 296, 320 280, 362 262"/>
  <path class="flow" style="stroke:#5490c2" d="M650 300 C 560 296, 480 280, 438 262"/>
  <path class="stream" style="stroke:#5490c2" d="M650 300 C 560 296, 480 280, 438 262"/>
  <path class="flow" style="stroke:#5fb6ad" d="M650 150 C 560 200, 480 232, 440 250"/>
  <path class="stream" style="stroke:#5fb6ad" d="M650 150 C 560 200, 480 232, 440 250"/>

  <!-- reactor orb -->
  <g transform="translate(400 250)">
    <circle r="92" fill="url(#orbglow)"/>
    <circle class="pulse" r="58"/>
    <circle r="78" fill="none" stroke="#1c3450" stroke-width="5"/>
    <circle r="78" fill="none" stroke="#7fd0ff" stroke-width="5" stroke-linecap="round"
      pathLength="100" stroke-dasharray="72 100" transform="rotate(-90)"
      style="filter:drop-shadow(0 0 6px #7fd0ff)"/>
    <circle r="58" fill="url(#orb)" style="filter:drop-shadow(0 0 16px #3aa0ff)"/>
    <ellipse cx="-17" cy="-21" rx="20" ry="12" fill="#fff" opacity="0.22"/>
    <circle r="44" fill="#07111f" fill-opacity="0.6"/>
    <text y="-2" fill="#fff" font-size="28" font-weight="800">2.58</text>
    <text y="16" fill="#9fc6ff" font-size="9" letter-spacing="2">kW · INVERTER</text>
  </g>

  <!-- sun -->
  <g transform="translate(130 130)">
    <g class="ray">
      <line x1="0" y1="-34" x2="0" y2="-46"/><line x1="24" y1="-24" x2="33" y2="-33"/>
      <line x1="34" y1="0" x2="46" y2="0"/><line x1="24" y1="24" x2="33" y2="33"/>
      <line x1="0" y1="34" x2="0" y2="46"/><line x1="-24" y1="24" x2="-33" y2="33"/>
      <line x1="-34" y1="0" x2="-46" y2="0"/><line x1="-24" y1="-24" x2="-33" y2="-33"/>
    </g>
    <circle r="28" fill="url(#sun)" style="filter:drop-shadow(0 0 12px #ffb300)"/>
  </g>
  <text class="lbl" x="130" y="192">SOLAR</text>
  <text class="val" x="130" y="208">3.82 kW</text>

  <!-- house -->
  <g transform="translate(670 130)" style="color:#5fb6ad">
    <path class="struct" stroke="#5fb6ad" d="M-32 0 L0 -28 L32 0 M-26 -2 L-26 28 L26 28 L26 -2"/>
    <path d="M-18 -10 L4 -10 L-1 0 L-23 0 Z" fill="#76e6ff" opacity="0.7"/>
    <rect x="-20" y="6" width="9" height="9" rx="1.5" fill="#ffe9a8"/>
    <rect x="11" y="6" width="9" height="9" rx="1.5" fill="#ffe9a8"/>
  </g>
  <text class="lbl" x="670" y="190">HOME</text>
  <text class="val" x="670" y="206">2.58 kW</text>

  <!-- battery -->
  <g transform="translate(120 300)">
    <rect x="-6" y="-44" width="12" height="6" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="-22" y="-38" width="44" height="78" rx="8" fill="rgba(255,255,255,0.04)"/>
    <rect x="-22" y="6" width="44" height="34" rx="6" fill="#33c463" opacity="0.92"/>
    <rect x="-22" y="-38" width="44" height="78" rx="8" fill="none" stroke="#33c463" stroke-width="2" opacity="0.6"/>
    <rect x="-22" y="-38" width="44" height="78" rx="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    <text x="0" y="6" fill="#fff" font-size="14" font-weight="800">86%</text>
  </g>
  <text class="lbl" x="120" y="362">BATTERY</text>

  <!-- grid pylon -->
  <g transform="translate(670 300)" style="color:#5490c2">
    <path class="struct" stroke="#5490c2" d="M-14 32 L-5 -32 L5 -32 L14 32 M-10 16 L10 16 M-8 0 L8 0 M-12 16 L0 0 L12 16 M-20 -22 L20 -22"
      style="filter:drop-shadow(0 0 5px #5490c2)"/>
  </g>
  <text class="lbl" x="670" y="356">GRID</text>
  <text class="val" x="670" y="372" fill="#fff" font-size="13" font-weight="700">↑ 1.24 kW</text>

  <!-- prepaid badge -->
  <g transform="translate(400 372)">
    <rect x="-66" y="-15" width="132" height="30" rx="15" fill="rgba(4,10,20,0.55)" stroke="#46d97c" stroke-width="1.5" style="filter:drop-shadow(0 0 8px #46d97c)"/>
    <circle cx="-48" cy="0" r="3.5" fill="#46d97c"/>
    <text x="4" y="-1" fill="#fff" font-size="13" font-weight="800">123.4 kWh</text>
    <text x="4" y="10" fill="#46d97c" font-size="7" letter-spacing="1">PREPAID BALANCE</text>
  </g>

  <rect width="800" height="420" fill="url(#vign)"/>
</svg>
